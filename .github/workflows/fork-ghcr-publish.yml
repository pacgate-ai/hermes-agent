name: Fork Docker Build and Publish to GHCR

# Builds the fork's source (upstream + Weixin QR onboarding + dashboard auth)
# into a Docker image and publishes it to ghcr.io/jzkk720/hermes-agent.
#
# This workflow runs on every push to main so that fork-specific features
# (weixin_qr_session.py, web onboarding endpoints, dashboard basic_auth)
# are baked into the published image — no local build required.
#
# The upstream docker-publish.yml is gated on `github.repository ==
# 'NousResearch/hermes-agent'` and pushes to Docker Hub, so it never
# fires on this fork. This workflow fills that gap with a simpler
# single-arch (amd64) build that pushes to GHCR using the built-in
# GITHUB_TOKEN (no Docker Hub secrets needed).

on:
  push:
    branches: [main]
    paths:
      - '**/*.py'
      - '**/*.ts'
      - '**/*.tsx'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - 'docker/**'
      - 'web/**'
      - '.github/workflows/fork-ghcr-publish.yml'

permissions:
  contents: read
  packages: write

concurrency:
  group: fork-ghcr-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
            type=raw,value=main

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            HERMES_GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=fork-ghcr-amd64
          cache-to: type=gha,mode=max,scope=fork-ghcr-amd64

      - name: Image digest
        run: echo "Published ${{ env.IMAGE_NAME }}@${{ steps.meta.outputs.labels['org.opencontainers.image.revision'] }}"
#
# docker-compose.windows.yml — Windows Docker Desktop compatible
#
# Differences from docker-compose.yml:
#   - Removes `network_mode: host` (not supported on Docker Desktop for Windows)
#   - Uses explicit port mappings instead
#   - Uses Windows-style volume path for ~/.hermes
#
# Usage:
#   docker compose -f docker-compose.windows.yml up -d --pull always --force-recreate --remove-orphans
#
# Override HERMES_FORK_IMAGE to use a different image (e.g. upstream Docker Hub):
#   HERMES_FORK_IMAGE=docker.io/nousresearch/hermes-agent:latest docker compose -f docker-compose.windows.yml up -d ...
#
services:
  gateway:
    # Fork GHCR image — includes Weixin QR onboarding + dashboard auth fixes.
    # Override with HERMES_FORK_IMAGE to use a different image (e.g. upstream Docker Hub).
    image: ${HERMES_FORK_IMAGE:-ghcr.io/jzkk720/hermes-agent:latest}
    container_name: hermes
    restart: unless-stopped
    volumes:
      - ${USERPROFILE}/.hermes:/opt/data
    environment:
      - HERMES_UID=10000
      - HERMES_GID=10000
    command: ["gateway", "run"]

  dashboard:
    image: ${HERMES_FORK_IMAGE:-ghcr.io/jzkk720/hermes-agent:latest}
    container_name: hermes-dashboard
    restart: unless-stopped
    depends_on:
      - gateway
    volumes:
      - ${USERPROFILE}/.hermes:/opt/data
    environment:
      - HERMES_UID=10000
      - HERMES_GID=10000
      - HERMES_DASHBOARD_HOST=0.0.0.0
    ports:
      - "127.0.0.1:9119:9119"
    command: ["dashboard", "--host", "0.0.0.0", "--port", "9119", "--no-open", "--insecure"]
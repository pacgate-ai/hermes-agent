# Hermes-Agent — Docker Compose (Ollama + PostgreSQL + WeChat)
#
# Default compose file for running the local stack against the fork's
# published GHCR image (includes Weixin QR onboarding + dashboard auth).
#
# First-run setup:
#   mkdir -p data
#   cp docker/hermes-env.example data/.env
#   # Edit data/.env if needed, then:
#   docker compose -f docker-compose.upstream.yml up -d --pull always --force-recreate --remove-orphans
#
# Services:
#   hermes-web     — Hermes web UI on :9119
#   hermes-gateway — Gateway runner with WeChat personal (weixin) platform enabled.
#                    No host ports — weixin uses outbound long-poll to Tencent iLink.
#   postgres       — PostgreSQL :5432 (database persisted in the postgres_data volume)
#
# Both hermes services share the same ./data volume.
# Bootstrap (config copy, skills sync) is idempotent — safe to run in parallel.
#
# Hermes web UI:                  http://localhost:9119  (login: admin / hermes)
# Interactive CLI (chat):         docker exec -it hermes-web hermes
# Connect WeChat (one-shot):      docker compose -f docker-compose.upstream.yml run --rm hermes-gateway hermes gateway setup
#
# Ports (host → container):
#   9119 → 9119   Hermes Web UI
#   8789 → 8789   API server (OpenAI-compatible)
#   8644 → 8644   Webhook (when enabled)
#   5433 → 5432   PostgreSQL (host:5433 → container:5432)

x-hermes-common: &hermes-common
  image: ${HERMES_FORK_IMAGE:-ghcr.io/jzkk720/hermes-agent:latest}
  pull_policy: always
  restart: unless-stopped
  volumes:
    # Runtime data (sessions, memories, skills, config) — persisted on host
    - ./data:/opt/data
    # Deployment config template — auto-copied to data/config.yaml on first start
    - ./docker/hermes-config.yaml:/opt/hermes/cli-config.yaml.example:ro
    # Use the upstream image's baked-in entrypoint. Overlaying docker/entrypoint.sh
    # from the fork can pin startup behavior and has caused drift on Windows checkouts.
  environment:
    # UID remapping — must match your host user to avoid permission issues
    - HERMES_UID=1000
    - HERMES_GID=1000
    # Ollama does not require a real API key; any non-empty string satisfies the field
    - OPENAI_API_KEY=ollama
    # Ollama lives on the Docker host. host.docker.internal resolves via the
    # extra_hosts entry below — works on Docker Desktop (Win/macOS) and on
    # Linux with the host-gateway mapping.
    - OPENAI_BASE_URL=http://host.docker.internal:11434/v1
    - OLLAMA_BASE_URL=http://host.docker.internal:11434
    # Postgres DSN — available to memory plugins and skills
    - DATABASE_URL=postgresql://hermes:${POSTGRES_PASSWORD:-changeme}@postgres:5432/hermes
  env_file:
    # User secrets — copy docker/hermes-env.example → data/.env and fill in
    - path: ./data/.env
      required: false
  extra_hosts:
    # On Linux Docker, resolves host.docker.internal → host network
    - "host.docker.internal:host-gateway"
  depends_on:
    postgres:
      condition: service_healthy

services:

  hermes-web:
    <<: *hermes-common
    container_name: hermes-web
    # Bind 0.0.0.0 inside the container so Docker port forwarding works.
    # Host-side binding is 127.0.0.1 (see ports below) so it's not LAN-exposed.
    # Upstream 0.17+ requires auth for non-loopback binds — basic_auth is
    # configured in data/config.yaml (username=admin, password=hermes).
    command: ["dashboard", "--host", "0.0.0.0", "--port", "9119", "--no-open"]
    environment:
      - GATEWAY_HEALTH_URL=http://hermes-gateway:8789
    volumes:
      - ./data:/opt/data
      - ./docker/hermes-config.yaml:/opt/hermes/cli-config.yaml.example:ro
      # The dashboard container registers a placeholder gateway-default log
      # service under /run/service during boot. Keep its log dir private so it
      # does not lock the shared gateway log path used by hermes-gateway.
      - hermes_web_gateway_default_log:/opt/data/logs/gateways/default
    ports:
      - "127.0.0.1:9119:9119"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; r=urllib.request.urlopen('http://127.0.0.1:9119/api/status'); sys.exit(0 if r.status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  hermes-gateway:
    <<: *hermes-common
    container_name: hermes-gateway
    # Runs the gateway with the weixin (WeChat personal / iLink) platform enabled
    # per docker/hermes-config.yaml. weixin uses outbound long-poll to
    # ilinkai.weixin.qq.com — no inbound host port needed.
    command: ["gateway", "run"]
    environment:
      - API_SERVER_KEY=${API_SERVER_KEY:-28765d337208aa3c0b6671cb1969e8cad9c22d7b7967b216}
      - API_SERVER_CORS_ORIGINS=http://localhost:8788,http://host.docker.internal:8788
      - GATEWAY_ALLOW_ALL_USERS=true
    ports:
      - "8789:8789"
      - "8644:8644"
    # Wait for hermes-web's healthcheck so config bootstrap is complete before gateway reads it
    depends_on:
      postgres:
        condition: service_healthy
      hermes-web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; r=urllib.request.urlopen('http://127.0.0.1:8789/health'); sys.exit(0 if r.status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  postgres:
    image: postgres:16-alpine
    container_name: hermes-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hermes
      POSTGRES_USER: hermes
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hermes -d hermes"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  hermes_web_gateway_default_log:
  postgres_data: